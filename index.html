<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>✈️ ScriptView</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Space Grotesk',sans-serif;
            background:
                radial-gradient(circle at top,#16314b 0%,#09121d 45%,#000 100%);
            color:#fff;
            min-height:100vh;
            padding:40px;
        }

        .container{
            max-width:1300px;
            margin:auto;
            padding:35px;
            background:rgba(255,255,255,.04);
            backdrop-filter:blur(16px);
            border:1px solid rgba(0,229,255,.2);
            border-radius:28px;
            box-shadow:
                0 0 45px rgba(0,229,255,.12),
                inset 0 0 20px rgba(255,255,255,.02);
        }

        h1{
            text-align:center;
            font-size:3rem;
            margin-bottom:10px;
            font-weight:700;
            background:linear-gradient(90deg,#4fc3f7,#00e5ff,#7df9ff);
            background-size:200%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            animation:gradient 6s linear infinite;
        }

        .subtitle{
            text-align:center;
            color:#9ca3af;
            margin-bottom:30px;
            font-size:1rem;
        }

        @keyframes gradient{
            from{background-position:0%;}
            to{background-position:200%;}
        }

        #preview{
            width:100%;
            height:500px;
            border:none;
            border-radius:18px;
            background:#fff;
            margin-bottom:25px;
            box-shadow:0 0 35px rgba(79,195,247,.18);
        }

        textarea{
            width:100%;
            height:320px;
            resize:vertical;
            border:none;
            border-radius:18px;
            background:#111827;
            color:#f3f4f6;
            font-family:Consolas,monospace;
            font-size:15px;
            line-height:1.6;
            padding:20px;
            outline:none;
            box-shadow:
                inset 0 0 0 2px rgba(79,195,247,.25),
                0 0 20px rgba(79,195,247,.1);
            transition:.25s;
        }

        textarea:focus{
            box-shadow:
                inset 0 0 0 2px #4fc3f7,
                0 0 30px rgba(79,195,247,.45);
        }

        .toolbar{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            margin-top:20px;
        }

        button{
            border:none;
            padding:14px 28px;
            border-radius:14px;
            background:linear-gradient(135deg,#4fc3f7,#81d4fa);
            color:#001b2e;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:.25s;
            box-shadow:0 0 20px rgba(79,195,247,.25);
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:
                0 0 30px rgba(79,195,247,.55),
                0 0 45px rgba(125,249,255,.2);
        }

        button:active{
            transform:scale(.97);
        }

        @media(max-width:800px){

            body{
                padding:20px;
            }

            .container{
                padding:20px;
            }

            h1{
                font-size:2.2rem;
            }

            #preview{
                height:350px;
            }

            textarea{
                height:240px;
            }

        }

    </style>
</head>
<body>

<div class="container">

    <h1>✈️ ScriptView</h1>
    <div class="subtitle">Build • Preview • Create</div>

    <iframe id="preview"></iframe>

    <textarea id="editor"><!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial,sans-serif;
    padding:30px;
}

h1{
    color:#2196f3;
}
</style>
</head>
<body>

<h1>Hello World!</h1>
<p>Start coding...</p>

</body>
</html></textarea>

    <div class="toolbar">
        <button onclick="runCode()">▶ Run</button>
        <button onclick="copyCode()">📋 Copy</button>
        <button onclick="downloadCode()">💾 Download</button>
    </div>

</div>

<script>

function runCode(){
    const code=document.getElementById("editor").value;
    const iframe=document.getElementById("preview");
    const doc=iframe.contentWindow.document;
    doc.open();
    doc.write(code);
    doc.close();
}

function copyCode(){
    navigator.clipboard.writeText(document.getElementById("editor").value);
    alert("Code copied!");
}

function downloadCode(){
    const code=document.getElementById("editor").value;
    const blob=new Blob([code],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="index.html";
    a.click();
    URL.revokeObjectURL(a.href);
}

document.getElementById("editor").addEventListener("keydown",function(e){
    if(e.ctrlKey && e.key==="Enter"){
        runCode();
    }
});

runCode();

</script>

<script src="/analytics-consent.js"></script>

</body>
</html>
