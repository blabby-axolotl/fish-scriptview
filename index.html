<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🐟 Plane Themed Scriptview</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Space Grotesk',sans-serif;
            background:
                radial-gradient(circle at top,#16263b 0%,#0b111a 45%,#000 100%);
            color:#fff;
            min-height:100vh;
            padding:40px;
        }

        .container{
            max-width:1300px;
            margin:auto;
            padding:35px;
            border-radius:28px;
            background:rgba(255,255,255,.04);
            backdrop-filter:blur(16px);
            border:1px solid rgba(0,229,255,.2);
            box-shadow:
                0 0 45px rgba(0,229,255,.15),
                inset 0 0 25px rgba(255,255,255,.02);
        }

        h1{
            text-align:center;
            font-size:3rem;
            margin-bottom:30px;
            font-weight:700;
            background:linear-gradient(90deg,#00e5ff,#00ff99,#00e5ff);
            background-size:200%;
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            animation:gradient 6s linear infinite;
        }

        @keyframes gradient{
            from{
                background-position:0%;
            }
            to{
                background-position:200%;
            }
        }

        #preview{
            width:100%;
            height:500px;
            background:white;
            border:none;
            border-radius:20px;
            margin-bottom:25px;
            box-shadow:
                0 0 25px rgba(0,229,255,.2),
                0 0 60px rgba(0,255,153,.08);
        }

        textarea{
            width:100%;
            height:320px;
            resize:vertical;
            border:none;
            border-radius:20px;
            padding:22px;
            font-family:Consolas,monospace;
            font-size:15px;
            line-height:1.6;
            background:#111827;
            color:#f3f4f6;
            outline:none;
            box-shadow:
                inset 0 0 0 2px rgba(0,229,255,.25),
                0 0 20px rgba(0,229,255,.1);
            transition:.25s;
        }

        textarea:focus{
            box-shadow:
                inset 0 0 0 2px #00e5ff,
                0 0 35px rgba(0,229,255,.45);
        }

        .toolbar{
            margin-top:20px;
            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        button{
            border:none;
            padding:14px 28px;
            border-radius:14px;
            background:linear-gradient(135deg,#00e5ff,#00ff99);
            color:#000;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:.25s;
            box-shadow:0 0 20px rgba(0,229,255,.3);
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:
                0 0 30px rgba(0,229,255,.6),
                0 0 50px rgba(0,255,153,.3);
        }

        button:active{
            transform:scale(.97);
        }

        .footer{
            margin-top:25px;
            text-align:center;
            color:#94a3b8;
            font-size:.95rem;
        }

        @media(max-width:800px){

            body{
                padding:20px;
            }

            .container{
                padding:20px;
            }

            h1{
                font-size:2.2rem;
            }

            #preview{
                height:350px;
            }

            textarea{
                height:250px;
            }

        }

    </style>
</head>

<body>

<div class="container">

    <h1>🐟 Plane Themed Scriptview</h1>

    <iframe id="preview"></iframe>

    <textarea id="editor"><!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:Arial,sans-serif;
    padding:30px;
}
h1{
    color:#00bcd4;
}
</style>
</head>
<body>

<h1>Hello FTGames!</h1>

<p>Start coding here...</p>

</body>
</html></textarea>

    <div class="toolbar">
        <button onclick="runCode()">▶ Run Code</button>
        <button onclick="copyCode()">📋 Copy Code</button>
        <button onclick="downloadCode()">💾 Download</button>
    </div>

    <div class="footer">
        Plane Themed Scriptview • FTGames HTML Previewer
    </div>

</div>

<script>

function runCode(){

    const code=document.getElementById("editor").value;

    const iframe=document.getElementById("preview");

    const doc=iframe.contentWindow.document;

    doc.open();
    doc.write(code);
    doc.close();

}

function copyCode(){

    navigator.clipboard.writeText(document.getElementById("editor").value);

    alert("Copied!");

}

function downloadCode(){

    const code=document.getElementById("editor").value;

    const blob=new Blob([code],{type:"text/html"});

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);

    a.download="index.html";

    a.click();

    URL.revokeObjectURL(a.href);

}

document.getElementById("editor").addEventListener("keydown",function(e){

    if(e.ctrlKey && e.key==="Enter"){

        runCode();

    }

});

runCode();

</script>

<script src="/analytics-consent.js"></script>

</body>
</html>
