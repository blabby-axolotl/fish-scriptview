<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fish ScriptView</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
            font-family: "Open Sans", sans-serif;
        }

        #preview {
            width: 100%;
            height: 400px;
            border: 2px solid #ccc;
            background: white;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 250px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Fish ScriptView</h1>

<iframe id="preview"></iframe>

<textarea id="editor"><h1>Hello World!</h1>
<p>Type HTML here.</p></textarea>

<br>
<button onclick="runCode()">Run Code</button>

<script>
function runCode() {
    const code = document.getElementById("editor").value;
    const iframe = document.getElementById("preview");

    const doc = iframe.contentWindow.document;
    doc.open();
    doc.write(code);
    doc.close();
}

runCode();
</script>

  <script src="/analytics-consent.js"></script>
</body>
</html>
